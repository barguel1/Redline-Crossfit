<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Redline Crossfit</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">Redline <span>Crossfit</span></div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </header>
    <nav id="mobile-menu" class="hidden">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="features.html">Programs</a>
        <a href="contact.html">Contact</a>
    </nav>
    <section class="contact-section">
        <h1>Contact Us</h1>
        <p class="subtitle">Have a question or ready to get started? Reach out below.</p>

            <div class="contact-form">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Jane Smith">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="jane@email.com">
                </div>

                <div class="form-group">
                    <label for="interest">I'm interested in...</label>
                    <select id="interest">
                    <option value="">Select a program</option>
                    <option value="crossfit">Crossfit Classes</option>
                    <option value="strength">Strength Training</option>
                    <option value="personal">Personal Coaching</option>
                    <option value="hiit">HIIT & Conditioning</option>
                    <option value="mobility">Mobility & Recovery</option>
                    <option value="competition">Competition Prep</option>
                    <option value="other">Other / General Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Tell us about your goals or ask us anything..."></textarea>
                </div>

                <div class="form-submit">
                    <button type="button" onclick="handleSubmit()">Send Message</button>
                </div>

            </div>
            <div class="contact-info">
                <div class="info-block">
                    <div class="info-icon">📍</div>
                    <h4>Location</h4>
                    <p>123 Main St<br>Your City, ST 00000</p>
                </div>
                <div class="info-block">
                    <div class="info-icon">🕐</div>
                    <h4>Hours</h4>
                    <p>Mon–Fri: 5am – 8pm<br>Sat–Sun: 7am – 2pm</p>
                </div>
                <div class="info-block">
                    <div class="info-icon">📧</div>
                    <h4>Email</h4>
                    <p>hello@redlinecrossfit.com</p>
                </div>

            </div>
    </section>
    <footer>
        <a href="#">Privacy</a> | <a href="#">Terms</a> | <a href="contact.html">Contact</a>
    </footer>

    <script src="script.js"></script>

</body>
</html>
