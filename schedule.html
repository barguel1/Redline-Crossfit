<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule - Redline Crossfit</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <header>
       <div class="logo">Redline <span>Crossfit</span></div>
       <div class="menu-toggle" onclick="toggleMenu()">☰</div> 
    </header>
    <nav id="mobile-menu" class="hidden">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="features.html">Programs</a>
        <a href="schedule.html">Schedule</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>
        
    </nav>
    <section class="schedule-hero">
        <h1>Crossfit <span>Schedule</span></h1>
        <p>Pick your day and find a session that fits your training.</p>
    </section>
    <div class="day-tabs" id="day-tabs" role="tablist" aria-label="Schedule day">
        <button class="day-tab active" type="button" role="tab" data-day="mon">Mon</button>
        <button class="day-tab" type="button" role="tab" data-day="tue">Tue</button>
        <button class="day-tab" type="button" role="tab" data-day="wed">Wed</button>
        <button class="day-tab" type="button" role="tab" data-day="thu">Thu</button>
        <button class="day-tab" type="button" role="tab" data-day="fri">Fri</button>
        <button class="day-tab" type="button" role="tab" data-day="sat">Sat</button>
        <button class="day-tab" type="button" role="tab" data-day="sun">Sun</button>
    </div>

    <section class="schedule-list" id="schedule-list" aria-live="polite"></section>

    <footer>
        <a href="#">Privacy</a> | <a href="#">Terms</a> | <a href="contact.html">Contact</a>
